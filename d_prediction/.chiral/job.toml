name = "d_prediction"
description = "Applies the trained ensemble engine to score candidate sequences and identifies top leads for in-vitro validation."
depends_on = ["b_features", "c_model"]
inputs = ["peptide_features.csv", "peptide_guardian_model.pkl", "label_encoder.pkl"]
outputs = ["guardian_leads.csv", "final_discovery_report.html"]

[container]
image = "chiral-guardian:v1"

[scripts]
pre = "pre_run.sh"
run = "run.sh"