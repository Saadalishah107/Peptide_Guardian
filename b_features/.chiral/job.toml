name = "b_features"
description = "Calculates molecular weight, pI, hydrophobicity (GRAVY), and charge to map the peptide ADMET landscape."
depends_on = ["a_ingest"]
inputs = ["cleaned_sequences.csv"]
outputs = ["peptide_features.csv", "screening_report.html"]

[container]
image = "chiral-guardian:v1"

[scripts]
pre = "pre_run.sh"
run = "run.sh"